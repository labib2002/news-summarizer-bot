name: Daily News Briefing

on:
  workflow_dispatch: # Allows you to run this manually from the Actions tab
  schedule:
    # Runs every day at 07:00 UTC.
    - cron: '0 7 * * *'

jobs:
  build-and-send-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Reads the feed list from the committed feeds.ini (no secrets needed).
      - name: Step 1 - Gather News Articles
        run: python gather_news.py

      # Secrets come from repository Actions secrets, never from the repo.
      - name: Step 2 - Summarize and Send Briefing
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python summarize_and_send.py