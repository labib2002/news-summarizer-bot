name: Daily News Briefing

on:
  workflow_dispatch: # Allows you to run this manually from the Actions tab
  schedule:
    # Runs every day at 07:00 UTC. Use https://crontab.guru/ to customize.
    - cron: '0 7 * * *'

jobs:
  build-and-send-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Step 1 - Gather News Articles
        run: python gather_news.py

      - name: Step 2 - Summarize, Send Briefing, and Clear DB
        env:
          # Use the secrets we defined in repository settings
          GITHUB_ACTIONS: 'true' # Lets our script know it's running in the cloud
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python summarize_and_send.py

      - name: Step 3 - Commit the cleared database
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add news_articles.db
          # Check if there are changes before committing
          if git diff --staged --quiet; then
            echo "No database changes to commit."
          else
            git commit -m "Automated commit: Clear daily news database"
            git push
          fi