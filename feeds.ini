# Committed RSS feed list for the daily briefing.
#
# This file is read by gather_news.py and is safe to commit: it contains no
# secrets. Secrets (Gemini/Telegram) come from environment variables in CI,
# or from a local, gitignored config.ini (see README.md).
#
# Format: every section named [feeds_<category>] is a feed group; the section
# suffix becomes the category shown in the briefing ("feeds_tech_news" ->
# "Tech News"). Each entry is:  <feed name> = <feed url>
#
# All URLs below were verified to return valid RSS/Atom (2026-07-10).

[feeds_tech_news]
hacker_news = https://news.ycombinator.com/rss
ars_technica = https://feeds.arstechnica.com/arstechnica/index
the_verge = https://www.theverge.com/rss/index.xml
techcrunch = https://techcrunch.com/feed/
the_register = https://www.theregister.com/headlines.atom
wired = https://www.wired.com/feed/rss
ieee_spectrum = https://spectrum.ieee.org/feeds/feed.rss

[feeds_artificial_intelligence]
mit_tech_review_ai = https://www.technologyreview.com/topic/artificial-intelligence/feed
google_ai_blog = https://blog.google/technology/ai/rss/
venturebeat_ai = https://venturebeat.com/category/ai/feed/
simon_willison = https://simonwillison.net/atom/everything/
